---
services:
  nginx:
    container_name: nginx
    image: nginx:latest
    networks:
      - traefik
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.nginx.rule=Host(`nginx.sherrill-burt.com`)
      - traefik.http.routers.nginx.entrypoints=websecure
      - traefik.http.routers.nginx.tls=true
      - traefik.http.routers.nginx.tls.certresolver=cloudflare
networks:
  traefik:
    external: true